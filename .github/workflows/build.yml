name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Scriptum
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          dotnet restore Scriptum.csproj -p:Platform=x64 --verbosity normal > artifacts/restore.log 2>&1
          $restoreExitCode = $LASTEXITCODE
          Get-Content artifacts/restore.log -Tail 120
          if ($restoreExitCode -ne 0) {
            Write-Host "dotnet restore failed with exit code $restoreExitCode"
            exit $restoreExitCode
          }

      - name: Upload restore diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: restore-diagnostics
          path: artifacts/restore.log
          if-no-files-found: ignore

      - name: Build
        shell: pwsh
        run: |
          dotnet build Scriptum.csproj --configuration Release --no-restore -p:Platform=x64 --verbosity normal > artifacts/build.log 2>&1
          $buildExitCode = $LASTEXITCODE
          Get-Content artifacts/build.log -Tail 160
          if ($buildExitCode -ne 0) {
            Write-Host "dotnet build failed with exit code $buildExitCode"
            exit $buildExitCode
          }

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: artifacts/build.log
          if-no-files-found: ignore
