name: Build

on:
  push:
    branches:
      - main
      - stabilize-build-foundation
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Scriptum
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          show-progress: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Scriptum/Scriptum.csproj -p:Platform=x64 --verbosity minimal

      - name: Build
        run: dotnet build Scriptum/Scriptum.csproj --configuration Release --no-restore -p:Platform=x64 --verbosity minimal
