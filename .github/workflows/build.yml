name: Build

on:
  push:
    branches:
      - main
      - stabilize-build-foundation
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Scriptum
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Scriptum.sln /p:Platform=x64

      - name: Build
        run: dotnet build Scriptum.sln --configuration Release --no-restore /p:Platform=x64
